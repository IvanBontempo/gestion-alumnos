<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alumnos - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <h1>🎓 Gestión de Alumnos</h1>
        <p>Ingresá tus credenciales para continuar</p>

        <div id="alerta" class="alert alert-danger" style="display:none;"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="login()">
            Ingresar
        </button>
    </div>
</div>

<script>
    // Si ya hay token, redirigir al dashboard
    if (localStorage.getItem('token')) {
        window.location.href = '/frontend/dashboard.html';
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const alerta = document.getElementById('alerta');

        alerta.style.display = 'none';

        if (!email || !password) {
            alerta.textContent = 'Por favor completá todos los campos.';
            alerta.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                alerta.textContent = 'Email o contraseña incorrectos.';
                alerta.style.display = 'block';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('nombre', data.nombre);
            localStorage.setItem('rol', data.rol);

            window.location.href = '/frontend/dashboard.html';

        } catch (error) {
            alerta.textContent = 'Error al conectar con el servidor.';
            alerta.style.display = 'block';
        }
    }

    // Permitir login con Enter
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
